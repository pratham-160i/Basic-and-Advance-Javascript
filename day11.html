<html lang="en">

    <p>Day 11 Homework</p>

    <div class = "box">

    </div>

    <div class = "box">
        <input id="username" placeholder="Enter username">
    </div>

    <div>
    <form id="sum-form">
        <input type="number" id="num1">
        <input type="number" id="num2">
        <button type="submit">Add</button>
    </form>
    <p id="result"></p>
    </div>

    <div>
        <ul id="item-list">
            <li>Item 1</li>
            <li>Item 2</li>
